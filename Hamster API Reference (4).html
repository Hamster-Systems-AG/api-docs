{"openapi":"3.0.3","info":{"title":"Hamster Platform API","version":"1.0.0","description":"Complete API reference for the **Hamster** loyalty-cashback platform. This document consolidates all microservices in the order listed below.\n\n## Services\n| # | Service | Base Path | Description |\n|---|---------|-----------|-------------|\n| 1 | Auth | `/auth/v1` | Authentication & Authorization (Cognito JWT, OTP, Social, M2M) |\n| 2 | User | `/user/v1` | User profiles, retailer team members, themes, notifications |\n| 3 | Customer | `/cs/v1` | Customer records, wallets, referrals, admin operations |\n| 4 | Retailer | `/rs/v1` | Retailers, stores, POS, products, discounts, brands |\n| 5 | Transaction | `/ts/v1` | POS receipt ingestion, cashback engine, DLQ |\n| 6 | Posts | `/ps/v1` | Retailer marketing posts (simple & discount) |\n| 7 | Search | `/search/v1` | Full-text search via Elasticsearch |\n| 8 | Common | `/common/v1` | Categories, currencies, VAT, settings, dashboard |\n| 9 | Scheduler | `/scheduler/v1` | Cron jobs publishing to RabbitMQ |\n\n## Authentication\nMost endpoints require two headers:\n- `Authorization: Bearer <JWT>` — Cognito-issued JWT from the Auth Service\n- `X-HMAC-Code` — Per-request HMAC signature (returned alongside tokens)\n\nEndpoints marked `security: []` are **public**. The Auth Service itself issues tokens so most of its endpoints are also public.\n\nMachine-to-machine (M2M) calls use client credentials via `/auth/v1/m2m-token/refresh-token`.\n\n## Roles\n| Role | Description |\n|------|-------------|\n| `customer` | End-user app customer |\n| `retailer-admin` | Retailer administrator |\n| `store-manager` | Store manager |\n| `store-finance-manager` | Store finance manager |\n| `store-marketing-manager` | Store marketing manager |\n| `global-finance-manager` | Global finance manager |\n| `global-marketing-manager` | Global marketing manager |\n| `wheel-admin` | Platform super-admin |\n| `wheel-member` | Platform admin member |\n\n## Error Responses\nAll services use standard HTTP status codes:\n- `400` — Validation error or missing required field\n- `401` — Missing or invalid credentials\n- `403` — Insufficient permissions\n- `404` — Resource not found\n- `409` — Conflict (e.g. duplicate resource)\n- `500` — Internal server error\n\n**Strict schema validation**: any unknown property in a request body returns `400`.","contact":{"name":"Hamster Platform Team"},"license":{"name":"Proprietary"}},"servers":[{"url":"https://{host}","description":"Deployed — all services under ","variables":{"host":{"default":"api.example.com","description":"API gateway hostname"}}},{"url":"http://localhost","description":"Local — each service runs on its own port (see per-service base paths)"}],"tags":[{"name":"Auth Service","description":"Authentication & Authorization. Base path: `/auth/v1` | Local port: `5005`\n\nThe Auth Service handles authentication and authorization for the Hamster platform. It supports three user pools via AWS Cognito:\n\n- **Customers**: OTP-based passwordless login (email -> OTP -> tokens). Social login via Google and Apple.\n- **Retailers**: Password-based login with role assignment.\n- **Admins**: Password-based login for platform administrators.\n\nToken management (refresh, verify, logout) is provided for all user types. Machine-to-machine (M2M) authentication is available for service-to-service calls. Translation/i18n files are managed via S3.\n\nMost endpoints are public (the auth service itself issues tokens). Only change-password endpoints require a Bearer token, and i18n PUT requires an API key."},{"name":"Auth Service › Customer Auth","description":"OTP-based passwordless authentication for customers."},{"name":"Auth Service › Social Auth","description":"Google and Apple social login for customers."},{"name":"Auth Service › Retailer Auth","description":"Password-based authentication for retailer users."},{"name":"Auth Service › Admin Auth","description":"Password-based authentication for platform administrators."},{"name":"Auth Service › Translations","description":"i18n translation file management."},{"name":"Auth Service › Machine-to-Machine","description":"Service-to-service authentication."},{"name":"User Service","description":"User Profiles & Management. Base path: `/user/v1` | Local port: `5010`\n\nThe User Service manages user profiles, retailer team members, notifications, themes, and referral redirects. It supports two user types: end-user customers (via the Profile module) and retailer staff (via the Retailer User module). File uploads for profile pictures use multipart/form-data.\n\n## Authentication\nAll endpoints except health, referral redirect, and internal admin count require a valid Bearer (JWT) token and X-HMAC-Code header."},{"name":"User Service › Users","description":"Create user records."},{"name":"User Service › Profiles","description":"User profile CRUD with avatar upload."},{"name":"User Service › Me","description":"Current authenticated user info."},{"name":"User Service › Notifications","description":"Notification schedule, device info, and offer preferences."},{"name":"User Service › Retailer Users","description":"Retailer team member CRUD."},{"name":"User Service › Themes","description":"Card theme management (admin)."},{"name":"User Service › User Themes","description":"User card theme assignment."},{"name":"User Service › Referral","description":"Referral redirect handler."},{"name":"User Service › Internal","description":"Internal admin endpoints (public)."},{"name":"Customer Service","description":"Customer Records & Wallet. Base path: `/cs/v1` | Local port: `5030`\n\nThe Customer Service manages customer records, wallets, profiles, referrals, and admin customer operations. Customers are identified by their HAM ID (Hamster customer identifier) and have wallets for collecting and redeeming cashback credits.\n\n## Authentication\nAll endpoints require a valid Bearer (JWT) token and X-HMAC-Code header unless marked public. Public endpoints include the health probe and referral tracking (click, install, register, activate)."},{"name":"Customer Service › Customers","description":"Customer CRUD operations."},{"name":"Customer Service › Wallet","description":"Wallet balance and discount claiming."},{"name":"Customer Service › Profile","description":"Customer profile, wallet, categories, terms, and geo-coordinates."},{"name":"Customer Service › Referrals","description":"Referral link generation, tracking, and analytics."},{"name":"Customer Service › Admin Customers","description":"Platform admin customer management. Wheel Admin only."},{"name":"Retailer Service","description":"Retailer, Store & Product Management. Base path: `/rs/v1` | Local port: `5035`\n\nThe Retailer Service manages the merchant side of the Hamster platform: retailers, stores, POS terminals, brands, products, discounts, distributors, industries, and admin operations. File uploads (store logos, contracts, retailer profiles) use multipart/form-data.\n\n## Authentication\nAll endpoints except health and internal endpoints require a valid Bearer (JWT) token and X-HMAC-Code header. Role-based access control restricts write operations.\n\n## Roles\n- **ADMIN_ONLY**: retailer-admin, wheel-admin\n- **STORE_WRITE_ROLES**: retailer-admin, store-manager\n- **DISCOUNT_WRITE_ROLES**: retailer-admin, store-marketing-manager, global-marketing-manager\n- **PRODUCT_WRITE_ROLES**: retailer-admin, store-manager\n- **WHEEL_ADMIN**: wheel-admin (for admin module)"},{"name":"Retailer Service › Address","description":"Address management."},{"name":"Retailer Service › Brands","description":"Retailer brand management."},{"name":"Retailer Service › Discounts","description":"Discount/coupon CRUD and summary."},{"name":"Retailer Service › Distributors","description":"Distributor CRUD and sync."},{"name":"Retailer Service › Industries","description":"Industry reference data."},{"name":"Retailer Service › Products","description":"Product CRUD and batch creation."},{"name":"Retailer Service › Retailers","description":"Retailer and company management."},{"name":"Retailer Service › Stores","description":"Store CRUD, sync, favourites, and validation."},{"name":"Retailer Service › POS Terminals","description":"POS terminal listing."},{"name":"Retailer Service › Admin","description":"Platform admin: retailer analytics, reports, marketing requests. Wheel Admin only."},{"name":"Retailer Service › Partner API History","description":"External partner API call log."},{"name":"Retailer Service › Sync","description":"Full retailer data sync."},{"name":"Retailer Service › Upload","description":"Contract file upload."},{"name":"Transaction Service","description":"Transactions & Loyalty Engine. Base path: `/ts/v1` | Local port: `5040`\n\nThe Transaction Service ingests POS/receipt data from FiscalProvider and other providers, runs the loyalty cashback engine (collect / redeem / refund), and exposes query endpoints for transaction history, wallet balance, receipts and coupons. Requests are strictly validated — any property not defined on the schema returns 400.\n\n## Transaction Types\n`Partner.TransactionType` drives the cashback engine: `0` = REDEEM (spend wallet credits), `1` = COLLECT (earn cashback), `2` = REFUND (return / return-policy, uses `Partner.DocumentGuidRef`).\n\n## Authentication\nAll endpoints require a valid Bearer (JWT) token in the `Authorization` header. Most endpoints accept any authenticated role; the Dead Letter Queue endpoints are restricted to internal operations roles. The health probe is public and version-neutral at `/ts/health`."},{"name":"Transaction Service › Transactions","description":"Create, query, count and analyse transactions, and read wallet balance."},{"name":"Transaction Service › Receipts","description":"Full digital-receipt detail including payments, refunds and sales."},{"name":"Transaction Service › Reservations","description":"Pre-authorize wallet credit usage before a POS redemption."},{"name":"Transaction Service › Coupons","description":"Active coupons for a customer, retailer or store."},{"name":"Transaction Service › Dead Letter Queue","description":"Operational endpoints for messages that could not be processed. Restricted to internal operations roles."},{"name":"Posts Service","description":"Marketing Posts. Base path: `/ps/v1` | Local port: `5045`\n\nThe Posts Service lets retailers create, update, list and delete marketing posts (simple, image, video and discount posts), targeting them at customer groups and stores. Create and update accept multipart/form-data so an image or video file can be uploaded alongside the post metadata; media is stored in S3 and indexed for search. Requests are strictly validated — any property not defined on the schema returns 400.\n\n## Post Types\n`post_type` selects the kind of post: `1` = SIMPLE, `2` = DISCOUNT. Discount posts additionally carry a `discount_id`.\n\n## Authentication\nAll endpoints require a valid Bearer (JWT) token in the `Authorization` header. The health probe is public and version-neutral at `/ps/health`."},{"name":"Posts Service › Posts","description":"Create, query, update and delete retailer marketing posts."},{"name":"Search Service","description":"Full-Text Search (Elasticsearch). Base path: `/search/v1` | Local port: `5045`\n\nThe Search Service provides full-text search across the Hamster platform's entities (retailers, stores, products, discounts, posts, coupons, distributors) powered by Elasticsearch. All endpoints are public with no authentication required. Results are paginated and sorted by created_date descending by default. Fuzzy matching is enabled with AUTO fuzziness."},{"name":"Search Service › Retailers","description":"Search and retrieve retailers."},{"name":"Search Service › Stores","description":"Search and retrieve stores with optional favourite flag."},{"name":"Search Service › Products","description":"Search published products."},{"name":"Search Service › Discounts","description":"Search published discounts and check post associations."},{"name":"Search Service › Posts","description":"Search posts, retrieve details, and shareable OG-tagged HTML."},{"name":"Search Service › Coupons","description":"Search active, non-expired coupons."},{"name":"Search Service › Distributors","description":"Search and retrieve distributors."},{"name":"Search Service › Customers","description":"Customer coupon wallet and active POS coupons."},{"name":"Search Service › Admin Sync","description":"On-demand bulk sync and backfill operations for Elasticsearch indices."},{"name":"Common Service","description":"Shared Platform Resources. Base path: `/common/v1` | Local port: `5025`\n\nThe Common Service provides shared platform resources: product categories, currencies, VAT codes, global settings, admin configuration key-value pairs, and an admin dashboard with KPIs. Read endpoints are available to all authenticated roles; write endpoints are restricted to admins (retailer-admin, wheel-admin).\n\n## Authentication\nAll endpoints except the health probe require a valid Bearer (JWT) token in the `Authorization` header and an `X-HMAC-Code` header. Internal service-to-service calls use HMAC only."},{"name":"Common Service › Categories","description":"Product category CRUD and validation."},{"name":"Common Service › Currency","description":"Supported currencies."},{"name":"Common Service › VAT","description":"VAT code reference data."},{"name":"Common Service › Settings","description":"Global platform settings (cashback %, return period, etc.)."},{"name":"Common Service › Admin Config","description":"Key-value configuration store."},{"name":"Common Service › Admin Dashboard","description":"Platform KPIs, top retailers, and POS highlights."},{"name":"Scheduler Service","description":"Cron Scheduler. Base path: `/scheduler/v1` | Local port: `5020`\n\nThe Scheduler Service is a cron-driven event publisher with minimal HTTP exposure. It runs scheduled jobs that emit events to RabbitMQ for downstream services (primarily the notification service).\n\n## Scheduled Jobs\n- **Coupon Expiry Check**: Runs every minute, publishes to `scheduler.coupon.expiry_check` with payload `{ hours, triggered_at }` to trigger push notifications for coupons expiring within the next 24 hours.\n- **Notification Digest**: Runs every 10 seconds, publishes to `scheduler.notification.digest` with payload `{ triggered_at }` to flush the pending notification queue.\n\n## RabbitMQ Infrastructure\n- Exchange: `scheduler.events.topic` (durable topic exchange)\n- Dead Letter Exchange: `scheduler.dlx.exchange` (fanout)\n- Queue: `scheduler.events.queue` (quorum, max 10,000 messages, 1 h TTL)\n- DLQ: `scheduler.dlq.queue` (24 h TTL)\n\n## Authentication\nThe global auth framework (Cognito JWT + HMAC) is configured but the only HTTP endpoint (health) is public."},{"name":"Scheduler Service › Health","description":""}],"paths":{"/auth/v1/health":{"get":{"tags":["Auth Service"],"summary":"Liveness probe","description":"Public health check. No version prefix. Full path: /auth/health.","responses":{"200":{"description":"Service is up","content":{"application/json":{"schema":{"type":"object","properties":{"status":{"type":"string"}}},"example":{"status":"ok"}}}}},"x-service":"auth"}},"/auth/v1/signup":{"post":{"tags":["Auth Service › Customer Auth"],"summary":"Customer Signup","description":"Initiates passwordless signup. Cognito sends an OTP to the email. Returns a session token for OTP verification.","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/EmailDto"},"example":{"email":"user@example.com"}}}},"responses":{"201":{"description":"Cognito challenge initiated","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ChallengeResponseDto"}}}},"400":{"description":"Invalid email format"},"409":{"description":"User already exists"}},"x-service":"auth"}},"/auth/v1/login":{"post":{"tags":["Auth Service › Customer Auth"],"summary":"Customer Login","description":"Initiates passwordless login. Cognito sends an OTP to the email.","parameters":[{"name":"X-Device-Id","in":"header","required":false,"description":"Device identifier.","schema":{"type":"string"}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/EmailDto"},"example":{"email":"user@example.com"}}}},"responses":{"200":{"description":"Cognito challenge initiated","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ChallengeResponseDto"}}}},"400":{"description":"Invalid email format"},"401":{"description":"User not found or disabled"}},"x-service":"auth"}},"/auth/v1/otp/verify-otp":{"post":{"tags":["Auth Service › Customer Auth"],"summary":"Verify OTP","description":"Verifies the OTP code and returns JWT tokens on success.","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/VerifyOtpDto"},"example":{"email":"user@example.com","session":"AQICAHj...sessionToken...","answer":"123456"}}}},"responses":{"200":{"description":"Authentication successful","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CustomerAuthResponseDto"},"example":{"userId":"6a6f9a18-e8ec-4bd6-a90c-0ef0f35047f5","email":"user@example.com","hamId":"DE46411981215","customerTerms":1,"customerStatus":1,"hmacCode":"a3f1c2d4e5b6...","tokens":{"AccessToken":"eyJ...","IdToken":"eyJ...","RefreshToken":"eyJ..."}}}}},"400":{"description":"Invalid OTP or session"},"401":{"description":"OTP expired or incorrect"}},"x-service":"auth"}},"/auth/v1/otp/resend-otp":{"post":{"tags":["Auth Service › Customer Auth"],"summary":"Resend OTP","description":"Resends OTP code to the email. Returns a new session token.","parameters":[{"name":"X-Device-Id","in":"header","required":false,"schema":{"type":"string"}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/EmailDto"}}}},"responses":{"200":{"description":"OTP resent","content":{"application/json":{"schema":{"type":"object","properties":{"message":{"type":"string"},"session":{"type":"string"}}}}}},"400":{"description":"Invalid email"}},"x-service":"auth"}},"/auth/v1/token/refresh-token":{"post":{"tags":["Auth Service › Customer Auth"],"summary":"Refresh Token","description":"Exchange a refresh token for new access and ID tokens. For retailer tokens, include cognitoUsername.","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/RefreshTokenDto"},"example":{"refreshToken":"eyJraWQiOiJLTU1..."}}}},"responses":{"200":{"description":"New tokens issued","content":{"application/json":{"schema":{"$ref":"#/components/schemas/RefreshedTokensDto"},"example":{"accessToken":"eyJ...","idToken":"eyJ...","expiresIn":3600,"tokenType":"Bearer"}}}},"400":{"description":"Invalid or missing refresh token"},"401":{"description":"Refresh token expired or revoked"}},"x-service":"auth"}},"/auth/v1/token/verify-token":{"post":{"tags":["Auth Service › Customer Auth"],"summary":"Verify Token","description":"Validates a JWT token and returns its payload.","requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"token":{"type":"string","description":"JWT token to verify."}},"required":["token"]}}}},"responses":{"200":{"description":"Verification result","content":{"application/json":{"schema":{"$ref":"#/components/schemas/VerifyTokenResponseDto"}}}}},"x-service":"auth"}},"/auth/v1/logout":{"post":{"tags":["Auth Service › Customer Auth"],"summary":"Customer Logout","description":"Revokes the refresh token and signs out the user.","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/LogoutDto"},"example":{"refreshToken":"eyJraWQiOiJLTU1...","userId":"7f9c2c1a-3f9b-4e2b-8c1e-9a2b1c3d4e5f"}}}},"responses":{"200":{"description":"Logout successful","content":{"application/json":{"schema":{"type":"object","properties":{"message":{"type":"string"}}}}}},"400":{"description":"Invalid refresh token"}},"x-service":"auth"}},"/auth/v1/delete-account":{"delete":{"tags":["Auth Service › Customer Auth"],"summary":"Delete Account","description":"Deletes the customer's Cognito account and triggers downstream cleanup.","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/EmailDto"}}}},"responses":{"200":{"description":"Account deleted successfully"},"400":{"description":"Account already deleted"},"404":{"description":"User not found"}},"x-service":"auth"}},"/auth/v1/auth/providers":{"get":{"tags":["Auth Service › Social Auth"],"summary":"Get Identity Providers","description":"Returns available social login providers with redirect URLs.","parameters":[{"name":"clientId","in":"query","required":true,"schema":{"type":"string"}},{"name":"callbackUrl","in":"query","required":true,"schema":{"type":"string"}},{"name":"authorityUrl","in":"query","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Available providers","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/IdentityProviderDto"}},"example":[{"provider":"Google","redirectUrl":"https://cognito.example.com/oauth2/authorize?identity_provider=Google&..."},{"provider":"SignInWithApple","redirectUrl":"https://cognito.example.com/oauth2/authorize?identity_provider=SignInWithApple&..."}]}}}},"x-service":"auth"}},"/auth/v1/auth/google/token":{"get":{"tags":["Auth Service › Social Auth"],"summary":"Google Token Exchange","description":"Exchanges a Google authorization code for Hamster JWT tokens.","parameters":[{"name":"code","in":"query","required":true,"schema":{"type":"string"}},{"name":"clientId","in":"query","required":true,"schema":{"type":"string"}},{"name":"domain","in":"query","required":true,"schema":{"type":"string"}},{"name":"redirectUri","in":"query","required":true,"schema":{"type":"string"}},{"name":"codeVerifier","in":"query","required":false,"description":"PKCE code verifier.","schema":{"type":"string"}}],"responses":{"200":{"description":"Authentication successful","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CustomerAuthResponseDto"}}}},"400":{"description":"Missing or invalid authorization code"}},"x-service":"auth"}},"/auth/v1/auth/apple/token":{"get":{"tags":["Auth Service › Social Auth"],"summary":"Apple Token Exchange","description":"Exchanges an Apple authorization code for Hamster JWT tokens.","parameters":[{"name":"code","in":"query","required":true,"schema":{"type":"string"}},{"name":"clientId","in":"query","required":true,"schema":{"type":"string"}},{"name":"domain","in":"query","required":true,"schema":{"type":"string"}},{"name":"redirectUri","in":"query","required":true,"schema":{"type":"string"}},{"name":"codeVerifier","in":"query","required":false,"schema":{"type":"string"}}],"responses":{"200":{"description":"Authentication successful","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CustomerAuthResponseDto"}}}},"400":{"description":"Missing or invalid authorization code"}},"x-service":"auth"}},"/auth/v1/retailer-login":{"post":{"tags":["Auth Service › Retailer Auth"],"summary":"Retailer Login","description":"Password-based login for retailer users.","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/PasswordLoginDto"},"example":{"username":"retailer@example.com","password":"Strongp@ssw0rd"}}}},"responses":{"200":{"description":"Login successful","content":{"application/json":{"schema":{"$ref":"#/components/schemas/PasswordAuthResponseDto"},"example":{"accessToken":"eyJ...","refreshToken":"eyJ...","idToken":"eyJ...","expiresIn":3600,"tokenType":"Bearer","hmacCode":"a3f1...","permissions":{}}}}},"400":{"description":"Invalid credentials format"},"401":{"description":"Incorrect email or password"}},"x-service":"auth"}},"/auth/v1/retailer/register":{"post":{"tags":["Auth Service › Retailer Auth"],"summary":"Retailer Register","description":"Register a new retailer user with password and optional role.","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/RetailerRegisterDto"},"example":{"email":"retailer@example.com","password":"MyStr0ngP@ssword","repeatPassword":"MyStr0ngP@ssword","role":"retailer-admin"}}}},"responses":{"201":{"description":"Registration successful","content":{"application/json":{"schema":{"$ref":"#/components/schemas/PasswordAuthResponseDto"}}}},"400":{"description":"Invalid input or password too weak"},"409":{"description":"Email already registered"}},"x-service":"auth"}},"/auth/v1/retailer/create-user":{"post":{"tags":["Auth Service › Retailer Auth"],"summary":"Create Retailer User","description":"Creates a new Cognito user for a retailer (used internally when adding team members).","requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"email":{"type":"string","format":"email"},"password":{"type":"string","minLength":8}},"required":["email","password"]}}}},"responses":{"201":{"description":"User created","content":{"application/json":{"schema":{"type":"object","properties":{"message":{"type":"string"},"cognito_id":{"type":"string"}}},"example":{"message":"User created successfully","cognito_id":"6a6f9a18-e8ec-4bd6-a90c-0ef0f35047f5"}}}},"409":{"description":"User already exists"}},"x-service":"auth"}},"/auth/v1/retailer-logout":{"post":{"tags":["Auth Service › Retailer Auth"],"summary":"Retailer Logout","requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"refreshToken":{"type":"string","minLength":20,"maxLength":4096}},"required":["refreshToken"]}}}},"responses":{"200":{"description":"Logout successful"},"400":{"description":"Invalid refresh token"}},"x-service":"auth"}},"/auth/v1/forgot-password":{"post":{"tags":["Auth
